# Read by scripts/smoke_vlm.py (default path; overridable with
# --focus-regions PATH for concurrent sessions working against different
# copies of this file). Written by scripts/annotate_focus_regions.py.
#
# Keys: "exam_id/question_id" flat strings. Values mirror FocusRegion.
# The `source` field carries provenance — currently every entry here is
# `mock_tricky` / `mock_tricky_plus` because it was migrated from a
# Python dict literal. Once the annotation tool has been run, entries
# it touches flip to `operator_annotated`.
#
# NOTE: regions in this file may point at the wrong part of the page.
# The old mush renderer hid this; the legibility-first renderer exposed
# it. See attractor: auto-grader_visual-focus-region-annotation_2026-04-10.

